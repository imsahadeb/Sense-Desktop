name: Release Windows Client

on:
  push:
    branches:
      - main
    tags-ignore:
      - 'v*' # Avoid double-triggering when the action itself creates a tag

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Next Version
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x



      - name: Set Version Environment Variable
        run: |
          echo "VERSION=${{ steps.tag_version.outputs.new_version }}" >> $env:GITHUB_ENV
          echo "TAG=${{ steps.tag_version.outputs.new_tag }}" >> $env:GITHUB_ENV
          
          # Use RELEASE_NOTES.md if it exists, otherwise use the automated changelog
          if (Test-Path "RELEASE_NOTES.md") {
              Get-Content "RELEASE_NOTES.md" -Raw > release_notes.txt
              echo "Using manual release notes from RELEASE_NOTES.md"
          } else {
              echo "${{ steps.tag_version.outputs.changelog }}" > release_notes.txt
              echo "Using automated release notes from commit messages"
          }
        shell: powershell

      - name: Restore Dependencies
        run: dotnet restore EnfySense/EnfySense.csproj

      - name: Build Application
        run: |
          dotnet publish EnfySense/EnfySense.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ env.VERSION }} `
            -o artifacts/publish

      - name: Build Watchdog
        run: |
          dotnet publish EnfySense.Watchdog/EnfySense.Watchdog.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:Version=${{ env.VERSION }} `
            -o artifacts/publish

      - name: Build Installer with Inno Setup
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ env.VERSION }}" `
            "/DSourceDir=${{ github.workspace }}\artifacts\publish" `
            "/DOutputDir=${{ github.workspace }}\artifacts\installer" `
            "${{ github.workspace }}\EnfySense\installer\EnfySense.iss"
        shell: powershell

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ env.TAG }}
          tag_name: ${{ env.TAG }}
          body_path: release_notes.txt
          files: artifacts/installer/*.exe
          token: ${{ secrets.GITHUB_TOKEN }}
          draft: false
          prerelease: false
